services:
  postgres:
    image: postgres:17-alpine
    container_name: azerro-postgres
    restart: always
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data

  postgres-test:
    image: postgres:17-alpine
    container_name: azerro-postgres-test
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: azerro_test
    volumes:
      - pgdata-test:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: azerro-backend
    restart: always
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    depends_on:
      - postgres

volumes:
  pgdata:
  pgdata-test:
