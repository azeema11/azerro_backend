services:
  postgres:
    image: postgres:17-alpine
    container_name: azerro-postgres
    restart: always
    ports:
      - "127.0.0.1:5432:5432"
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data

  postgres-test:
    image: postgres:17-alpine
    container_name: azerro-postgres-test
    restart: always
    profiles:
      - test
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: azerro_test
    volumes:
      - pgdata-test:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: azerro-backend
    restart: always
    ports:
      - "127.0.0.1:${PORT:-3000}:3000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
  pgdata-test:
