name: Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: |
          gcloud auth configure-docker asia-south1-docker.pkg.dev

      - name: Build and Push Image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/azerro/azerro-backend:${{ github.sha }} \
            --push .

      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            cd ~/azerro-stack
            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${{ github.sha }}/" .env
            docker compose pull
            docker compose up -d
            sleep 5
            docker compose ps --format json | grep -q '"running"' || { echo "Service not running after deploy"; exit 1; }