name: Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Fetch Environment Secrets
        id: secrets
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          secrets: |-
            env_contents:projects/${{ secrets.GCP_PROJECT_ID }}/secrets/azerro-backend-env/versions/latest

      - name: Configure Docker
        run: |
          gcloud auth configure-docker asia-south1-docker.pkg.dev

      - name: Build and Push Image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/azerro/azerro-backend:${{ github.sha }} \
            --push .

      - name: Deploy to GCP VM via gcloud (IAP Tunnel)
        env:
          ENV_CONTENTS: ${{ steps.secrets.outputs.env_contents }}
          IMAGE_TAG: ${{ github.sha }}
          VM_NAME: ${{ secrets.VM_NAME }}
          VM_ZONE: ${{ secrets.VM_ZONE }}
          VM_USER: ${{ secrets.VM_USER }}
          VM_PROJECT_DIRECTORY: ${{ secrets.VM_PROJECT_DIRECTORY }}
        run: |
          # 1. Write environment secrets securely to a temporary file on the runner
          printf "%s" "$ENV_CONTENTS" > .env.contents
          
          # 2. Package files, transfer them, and run the deploy script in a SINGLE SSH connection
          echo "Connecting to VM and deploying..."
          tar -cf - docker-compose.yml .env.contents | gcloud compute ssh $VM_USER@$VM_NAME \
            --zone=$VM_ZONE \
            --tunnel-through-iap \
            --quiet \
            --command="
              set -e
              
              # Extract files
              tar -xf - -C $VM_PROJECT_DIRECTORY
              cd $VM_PROJECT_DIRECTORY
              
              # Ensure .env.contents is removed on exit
              trap 'rm -f .env.contents' EXIT
              
              # Immediately restrict .env.contents to owner-only permissions before it is read
              chmod 600 .env.contents
              
              # Securely generate .env file using a temporary file under umask 077
              (
                umask 077
                temp_env=\$(mktemp .env.tmp.XXXXXX)
                trap 'rm -f \"\$temp_env\"' EXIT
                
                # Read from .env.contents and append IMAGE_TAG
                cat .env.contents > \"\$temp_env\"
                printf '\nIMAGE_TAG=%s\n' \"$IMAGE_TAG\" >> \"\$temp_env\"
                
                # Validate temporary file is not empty and contains the IMAGE_TAG
                if [ ! -s \"\$temp_env\" ] || ! grep -q 'IMAGE_TAG=' \"\$temp_env\"; then
                  echo 'Error: Generated temporary .env file is invalid or empty'
                  exit 1
                fi
                
                # Atomically replace .env and ensure permissions are 600
                mv \"\$temp_env\" .env
                chmod 600 .env
              )

              docker-compose pull
              docker-compose up -d
              docker image prune -f
              
              # Bounded wait for all services to be running and healthy
              echo 'Checking service readiness...'
              max_attempts=12
              attempt=1
              success=false
              
              while [ \$attempt -le \$max_attempts ]; do
                echo \"Attempt \$attempt of \$max_attempts...\"
                all_ok=true
                
                container_ids=\$(docker-compose ps -q)
                
                if [ -z \"\$container_ids\" ]; then
                  all_ok=false
                else
                  for cid in \$container_ids; do
                    state=\$(docker inspect --format '{{.State.Status}}' \"\$cid\")
                    health=\$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' \"\$cid\")
                    
                    if [ \"\$state\" != \"running\" ]; then
                      echo \"Container \$cid is not running (state: \$state)\"
                      all_ok=false
                    elif [ \"\$health\" != \"none\" ] && [ \"\$health\" != \"healthy\" ]; then
                      echo \"Container \$cid is running but not healthy (health: \$health)\"
                      all_ok=false
                    fi
                  done
                fi
                
                if [ \"\$all_ok\" = \"true\" ]; then
                  success=true
                  break
                fi
                
                sleep 5
                attempt=\$((attempt + 1))
              done
              
              if [ \"\$success\" = \"true\" ]; then
                echo 'Deploy successful - all services are running and healthy'
              else
                echo 'Deploy FAILED - services not running or unhealthy'
                docker-compose ps
                docker-compose logs --tail=30
                exit 1
              fi
            "
          
          # Clean up local temporary file on runner
          rm -f .env.contents
