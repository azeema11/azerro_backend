name: Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Fetch Environment Secrets
        id: secrets
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          secrets: |-
            env_contents:projects/${{ secrets.GCP_PROJECT_ID }}/secrets/azerro-backend-env/versions/latest

      - name: Configure Docker
        run: |
          gcloud auth configure-docker asia-south1-docker.pkg.dev

      - name: Build and Push Image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/azerro/azerro-backend:${{ github.sha }} \
            --push .

      - name: Deploy to GCP VM via gcloud (IAP Tunnel)
        env:
          ENV_CONTENTS: ${{ steps.secrets.outputs.env_contents }}
          IMAGE_TAG: ${{ github.sha }}
          VM_NAME: ${{ secrets.VM_NAME }}
          VM_ZONE: ${{ secrets.VM_ZONE }}
          VM_USER: ${{ secrets.VM_USER }}
        run: |
          # 1. Write environment secrets securely to a temporary file on the runner
          printf "%s" "$ENV_CONTENTS" > .env.contents
          
          # 2. Copy files to VM using gcloud compute scp (with IAP tunnel)
          echo "Copying docker-compose.yml and environment secrets to VM..."
          gcloud compute scp docker-compose.yml .env.contents $VM_USER@$VM_NAME:/home/azeem/azerro-stack/ \
            --zone=$VM_ZONE \
            --tunnel-through-iap \
            --quiet
          
          # Clean up local temporary file
          rm -f .env.contents
            
          # 3. Run deploy script using gcloud compute ssh (with IAP tunnel)
          echo "Running deploy script on VM..."
          gcloud compute ssh $VM_USER@$VM_NAME \
            --zone=$VM_ZONE \
            --tunnel-through-iap \
            --quiet \
            --command="
              set -e
              cd /home/azeem/azerro-stack
              
              # Securely generate .env file using a temporary file under umask 077
              (
                umask 077
                temp_env=\$(mktemp .env.tmp.XXXXXX)
                
                # Read from .env.contents and append IMAGE_TAG
                cat .env.contents > \"\$temp_env\"
                printf '\nIMAGE_TAG=%s\n' \"$IMAGE_TAG\" >> \"\$temp_env\"
                
                # Validate temporary file is not empty and contains the IMAGE_TAG
                if [ ! -s \"\$temp_env\" ] || ! grep -q 'IMAGE_TAG=' \"\$temp_env\"; then
                  echo 'Error: Generated temporary .env file is invalid or empty'
                  rm -f \"\$temp_env\"
                  exit 1
                fi
                
                # Atomically replace .env and ensure permissions are 600
                mv \"\$temp_env\" .env
                chmod 600 .env
                rm -f .env.contents
              )

              docker-compose pull
              docker-compose up -d
              docker image prune -f
              sleep 5
              docker-compose ps
              if docker-compose ps | grep -q 'Up'; then
                echo 'Deploy successful - services are running'
              else
                echo 'Deploy FAILED - services not running'
                docker-compose logs --tail=30
                exit 1
              fi
            "
